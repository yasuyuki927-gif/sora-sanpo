<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b1524" />
<meta property="og:title" content="そらさんぽ日本 — ドローン視点で日本を飛ぼう" />
<meta property="og:description" content="実写3Dの日本の空を、ドローン視点で自由に飛べる無料Webアプリ。" />
<title>そらさんぽ日本 🚁</title>
<script>window.CESIUM_BASE_URL='https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118.0/';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118.0/Cesium.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118.0/Widgets/widgets.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0b1524; --panel:rgba(13,23,38,.62); --line:rgba(126,168,214,.28);
  --ink:#e9f2fd; --mut:#8fa6c0; --sky:#6fd3ff; --amber:#ffb454; --ok:#7ce7a5;
  --disp:'Zen Kaku Gothic New',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--disp);color:var(--ink);}
button{font-family:var(--disp);color:var(--ink);border:none;background:none;cursor:pointer;}
#cesiumContainer{position:absolute;inset:0;}
.cesium-widget-credits{font-size:9px!important;opacity:.75;}

/* ---------- 起動画面 ---------- */
#start{position:absolute;inset:0;z-index:80;background:
  radial-gradient(120% 90% at 50% 0%,#17335a 0%,#0b1524 62%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px;text-align:center;}
#start .logo{font-size:44px;line-height:1;}
#start h1{font-size:27px;font-weight:900;letter-spacing:.04em;}
#start .sub{font-size:13px;line-height:1.8;color:var(--mut);max-width:330px;}
#keyWrap{width:100%;max-width:330px;display:flex;flex-direction:column;gap:8px;}
#key{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);background:rgba(9,17,29,.85);color:var(--ink);font-size:14px;font-family:var(--mono);}
#go{width:100%;max-width:330px;padding:16px;border-radius:14px;font-size:17px;font-weight:900;letter-spacing:.06em;
  background:linear-gradient(135deg,#54c8ff,#2b7bff);box-shadow:0 10px 30px rgba(43,123,255,.35);}
#go:active{transform:scale(.98);}
#err{color:#ff7b7b;font-size:12px;min-height:16px;}
#start .foot{font-size:11px;color:#5f7692;}

/* ---------- HUD 上部ストリップ ---------- */
#hud{position:absolute;inset:0;z-index:20;pointer-events:none;display:none;}
#strip{position:absolute;top:calc(10px + var(--sat));left:50%;transform:translateX(-50%);
  display:flex;gap:0;align-items:stretch;background:var(--panel);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;}
#strip .cell{padding:7px 14px;text-align:center;min-width:74px;}
#strip .cell+.cell{border-left:1px solid var(--line);}
#strip .k{font-size:9px;letter-spacing:.18em;color:var(--mut);}
#strip .v{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--sky);font-variant-numeric:tabular-nums;}
#strip .v small{font-size:10px;color:var(--mut);margin-left:2px;}

/* ---------- 右上アクション ---------- */
#actions{position:absolute;top:calc(10px + var(--sat));right:12px;display:flex;flex-direction:column;gap:8px;pointer-events:auto;}
.act{width:46px;height:46px;border-radius:13px;background:var(--panel);backdrop-filter:blur(10px);
  border:1px solid var(--line);font-size:20px;display:flex;align-items:center;justify-content:center;}
.act:active{background:rgba(84,200,255,.25);}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .25s;}

/* ---------- ワープバー(署名要素) ---------- */
#warp{position:absolute;left:0;right:0;bottom:calc(178px + var(--sab));pointer-events:auto;
  display:flex;gap:8px;overflow-x:auto;padding:6px 14px;scrollbar-width:none;}
#warp::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:22px;
  background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);font-size:13px;font-weight:700;white-space:nowrap;}
.chip:active{background:rgba(84,200,255,.3);}
.chip .rg{font-size:9px;font-weight:500;color:var(--mut);letter-spacing:.1em;}
.chip.fav{border-color:rgba(255,180,84,.45);}

/* ---------- スティック ---------- */
.stick{position:absolute;bottom:calc(28px + var(--sab));width:128px;height:128px;border-radius:50%;
  background:radial-gradient(circle,rgba(20,34,54,.28) 60%,rgba(20,34,54,.5));
  border:1px solid var(--line);pointer-events:auto;touch-action:none;}
#stickL{left:18px;} #stickR{right:18px;}
.knob{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px 0 0 -27px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#6fd3ff,#2b7bff);box-shadow:0 5px 16px rgba(0,0,0,.45);}
.stick .lbl{position:absolute;left:0;right:0;bottom:-19px;text-align:center;font-size:10px;color:var(--mut);letter-spacing:.05em;}

/* ---------- スピード切替 ---------- */
#speed{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(64px + var(--sab));pointer-events:auto;
  display:flex;background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:22px;overflow:hidden;}
#speed button{padding:9px 15px;font-size:12px;font-weight:700;color:var(--mut);}
#speed button.on{background:linear-gradient(135deg,#54c8ff,#2b7bff);color:#fff;}

/* ---------- お気に入りパネル ---------- */
#favPanel{position:absolute;inset:0;z-index:60;background:rgba(6,11,19,.72);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;pointer-events:auto;}
#favSheet{width:100%;max-height:70%;background:#0f1c30;border-radius:20px 20px 0 0;border-top:1px solid var(--line);
  padding:18px 18px calc(18px + var(--sab));display:flex;flex-direction:column;gap:12px;}
#favSheet h2{font-size:16px;font-weight:900;display:flex;justify-content:space-between;align-items:center;}
#favSheet h2 button{font-size:13px;color:var(--sky);font-weight:700;}
#favList{overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.favRow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.favRow .nm{flex:1;font-size:14px;font-weight:700;text-align:left;}
.favRow .meta{font-family:var(--mono);font-size:10px;color:var(--mut);}
.favRow .del{font-size:16px;color:#ff8585;padding:4px 6px;}
#favEmpty{font-size:13px;color:var(--mut);text-align:center;padding:22px 0;line-height:1.8;}
#favAdd{padding:14px;border-radius:13px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#ffc46b,#ff9d3d);color:#20140a;}

/* ---------- トースト ---------- */
#toast{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(230px + var(--sab));z-index:70;
  background:rgba(15,28,48,.92);border:1px solid var(--line);border-radius:12px;padding:10px 18px;
  font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<!-- HUD -->
<div id="hud">
  <div id="strip">
    <div class="cell"><div class="k">高度</div><div class="v"><span id="vAlt">0</span><small>m</small></div></div>
    <div class="cell"><div class="k">方位</div><div class="v" id="vDir">N</div></div>
    <div class="cell"><div class="k">速度</div><div class="v" id="vSpd">×1</div></div>
  </div>

  <div id="actions">
    <button class="act" id="btnShot" aria-label="スクリーンショット">📷</button>
    <button class="act" id="btnFav" aria-label="お気に入り">⭐️</button>
  </div>

  <div id="warp"></div>

  <div id="speed">
    <button data-s="0.5">ゆっくり</button>
    <button data-s="1" class="on">ふつう</button>
    <button data-s="3">はやい</button>
  </div>

  <div class="stick" id="stickL"><div class="knob"></div><div class="lbl">上下＝高度｜左右＝旋回</div></div>
  <div class="stick" id="stickR"><div class="knob"></div><div class="lbl">上下＝前進・後退｜左右＝横移動</div></div>
  <div id="flash"></div>
</div>

<!-- お気に入り -->
<div id="favPanel">
  <div id="favSheet">
    <h2>⭐️ お気に入り地点 <button id="favClose">閉じる</button></h2>
    <button id="favAdd">＋ いまの場所を保存する</button>
    <div id="favList"></div>
  </div>
</div>

<div id="toast"></div>

<!-- 起動画面 -->
<div id="start">
  <div class="logo">🚁</div>
  <h1>そらさんぽ日本</h1>
  <p class="sub">実写3Dの日本の空を、ドローン視点でスイーッとおさんぽ。大阪城から富士山まで、行きたい場所へひとっ飛び。</p>
  <div id="keyWrap">
    <input id="key" type="text" placeholder="Google Maps APIキー" autocomplete="off" />
    <div id="err"></div>
  </div>
  <button id="go">離陸する</button>
  <p class="foot">高度なグラフィックを使うため、読み込みに数秒かかることがあります。</p>
</div>

<script>
/* ================= 設定 =================
   公開時は下の EMBEDDED_KEY に自分のAPIキーを入れる。
   ※必ずGoogle Cloud側で「HTTPリファラー制限」を
     自分のGitHub Pagesドメインに設定してから公開すること！ */
const EMBEDDED_KEY = "AIzaSyDHWOWz7f0uk6NMtvLCRLnFpXFm3lgQOYg";

const WARPS = [
  ["🏯","大阪城","大阪",135.5259,34.6820,380,0],
  ["🍬","道頓堀","大阪",135.5013,34.6675,200,0.5],
  ["⛩","伏見稲荷","京都",135.7727,34.9671,320,4.7],
  ["🎋","清水寺","京都",135.7850,34.9949,300,4.5],
  ["🗼","東京タワー","東京",139.7454,35.6586,420,0.8],
  ["🌸","渋谷スクランブル","東京",139.7016,35.6595,260,1.2],
  ["🗻","富士山","静岡/山梨",138.7274,35.3606,4500,5.8],
  ["🦌","奈良公園","奈良",135.8430,34.6851,280,0],
  ["⛩","厳島神社","広島",132.3198,34.2958,300,2.4],
  ["🏰","名古屋城","愛知",136.8994,35.1856,320,3.1],
];

/* ================= 状態 ================= */
let viewer;
const st={lon:135.5259,lat:34.6820,h:380,heading:0,pitch:-0.30};
const inp={lx:0,ly:0,rx:0,ry:0};
let speedMul=1, warping=false;

/* ================= ユーティリティ ================= */
const $=id=>document.getElementById(id);
function toast(msg){const t=$('toast');t.textContent=msg;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,1800);}
function store(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function load(k){try{return localStorage.getItem(k);}catch(e){return null;}}

/* ================= 起動 ================= */
const savedKey=load('sk_key'); if(savedKey)$('key').value=savedKey;
if(EMBEDDED_KEY){$('keyWrap').style.display='none';}

$('go').onclick=async()=>{
  const k=EMBEDDED_KEY||$('key').value.trim();
  if(!k){$('err').textContent='APIキーを入力してな';return;}
  $('err').textContent='';$('go').textContent='読み込み中…';
  try{
    Cesium.GoogleMaps.defaultApiKey=k;
    viewer=new Cesium.Viewer('cesiumContainer',{
      baseLayer:false,baseLayerPicker:false,geocoder:false,homeButton:false,
      sceneModePicker:false,navigationHelpButton:false,animation:false,timeline:false,
      fullscreenButton:false,infoBox:false,selectionIndicator:false,
      terrainProvider:new Cesium.EllipsoidTerrainProvider(),
      contextOptions:{webgl:{preserveDrawingBuffer:true}},
      requestRenderMode:false,
    });
    viewer.scene.globe.show=false;
    viewer.scene.screenSpaceCameraController.enableInputs=false;
    viewer.scene.primitives.add(await Cesium.createGooglePhotorealistic3DTileset());
    if(!EMBEDDED_KEY)store('sk_key',k);
    $('start').style.display='none';$('hud').style.display='block';
    buildWarps();renderFavs();applyView();loop();
    toast('🚁 離陸！ゆっくり飛んでな');
  }catch(e){
    console.error(e);
    $('go').textContent='離陸する';
    $('err').textContent='読み込めへんかった。キーと「Map Tiles API」の有効化を確認してな。';
  }
};

/* ================= 飛行ループ ================= */
function applyView(){
  viewer.camera.setView({
    destination:Cesium.Cartesian3.fromDegrees(st.lon,st.lat,st.h),
    orientation:{heading:st.heading,pitch:st.pitch,roll:inp.lx*0.22}
  });
}
function loop(){
  if(!warping){
    const base=0.0000045*speedMul, altStep=45*speedMul, yaw=0.014;
    st.heading=(st.heading+inp.lx*yaw+Math.PI*2)%(Math.PI*2);
    st.h=Math.max(60,Math.min(9000,st.h-inp.ly*altStep));
    const fwd=-inp.ry, sde=inp.rx;
    // 高いほど速く動くと気持ちいい(高度連動)
    const m=base*(0.6+st.h/900);
    st.lat+=Math.cos(st.heading)*fwd*m+Math.cos(st.heading+Math.PI/2)*sde*m;
    st.lon+=(Math.sin(st.heading)*fwd*m+Math.sin(st.heading+Math.PI/2)*sde*m)/Math.cos(st.lat*Math.PI/180);
    st.lat=Math.max(24,Math.min(46,st.lat));   // 日本国内限定
    st.lon=Math.max(122,Math.min(154,st.lon));
    applyView();
  }
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  $('vAlt').textContent=Math.round(st.h);
  $('vDir').textContent=dirs[Math.round(((st.heading*180/Math.PI)%360)/45)%8];
  requestAnimationFrame(loop);
}

/* ================= スティック ================= */
function joystick(el,cb){
  const knob=el.querySelector('.knob');let id=null,cx=0,cy=0;const R=44;
  const set=(x,y)=>{const d=Math.hypot(x,y);if(d>R){x=x/d*R;y=y/d*R;}knob.style.transform=`translate(${x}px,${y}px)`;cb(x/R,y/R);};
  const reset=()=>{knob.style.transform='';cb(0,0);id=null;};
  el.addEventListener('touchstart',e=>{const t=e.changedTouches[0];id=t.identifier;
    const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;
    set(t.clientX-cx,t.clientY-cy);e.preventDefault();},{passive:false});
  el.addEventListener('touchmove',e=>{for(const t of e.changedTouches)if(t.identifier===id){set(t.clientX-cx,t.clientY-cy);e.preventDefault();}},{passive:false});
  el.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===id)reset();});
  el.addEventListener('touchcancel',reset);
  let md=false;
  el.addEventListener('mousedown',e=>{md=true;const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;set(e.clientX-cx,e.clientY-cy);});
  addEventListener('mousemove',e=>{if(md)set(e.clientX-cx,e.clientY-cy);});
  addEventListener('mouseup',()=>{if(md){md=false;reset();}});
}
joystick($('stickL'),(x,y)=>{inp.lx=x;inp.ly=y;});
joystick($('stickR'),(x,y)=>{inp.rx=x;inp.ry=y;});

/* ================= スピード ================= */
document.querySelectorAll('#speed button').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('#speed button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');speedMul=parseFloat(b.dataset.s);
    $('vSpd').textContent='×'+b.dataset.s;};
});

/* ================= ワープ ================= */
function buildWarps(){
  const bar=$('warp');bar.innerHTML='';
  WARPS.forEach(w=>{
    const c=document.createElement('button');c.className='chip';
    c.innerHTML=`${w[0]} ${w[1]} <span class="rg">${w[2]}</span>`;
    c.onclick=()=>flyTo(w[1],w[3],w[4],w[5],w[6]);
    bar.appendChild(c);
  });
  favs().forEach((f,i)=>{
    const c=document.createElement('button');c.className='chip fav';
    c.innerHTML=`⭐️ ${f.n}`;
    c.onclick=()=>flyTo(f.n,f.lon,f.lat,f.h,f.hd);
    bar.appendChild(c);
  });
}
function flyTo(name,lon,lat,h,hd){
  warping=true;toast(`✈️ ${name}へワープ中…`);
  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(lon,lat,h),
    orientation:{heading:hd,pitch:st.pitch},duration:3.2,
    complete:()=>{Object.assign(st,{lon,lat,h,heading:hd});warping=false;},
    cancel:()=>{warping=false;}
  });
}

/* ================= お気に入り ================= */
function favs(){try{return JSON.parse(load('sk_favs')||'[]');}catch(e){return[];}}
function saveFavs(a){store('sk_favs',JSON.stringify(a));}
$('btnFav').onclick=()=>{renderFavs();$('favPanel').style.display='flex';};
$('favClose').onclick=()=>{$('favPanel').style.display='none';};
$('favPanel').onclick=e=>{if(e.target.id==='favPanel')$('favPanel').style.display='none';};
$('favAdd').onclick=()=>{
  const a=favs();
  if(a.length>=5){toast('無料版はお気に入り5件までやで');return;}
  const n=prompt('この場所の名前は？','マイスポット'+(a.length+1));
  if(!n)return;
  a.push({n:n.slice(0,12),lon:st.lon,lat:st.lat,h:Math.round(st.h),hd:st.heading});
  saveFavs(a);renderFavs();buildWarps();toast('⭐️ 保存したで！');
};
function renderFavs(){
  const a=favs(),list=$('favList');list.innerHTML='';
  if(!a.length){list.innerHTML='<div id="favEmpty">まだ保存した場所がないで。<br>ええ景色を見つけたら「＋」で保存しよ！</div>';return;}
  a.forEach((f,i)=>{
    const r=document.createElement('div');r.className='favRow';
    r.innerHTML=`<button class="nm">⭐️ ${f.n}</button><span class="meta">${Math.round(f.h)}m</span><button class="del">✕</button>`;
    r.querySelector('.nm').onclick=()=>{$('favPanel').style.display='none';flyTo(f.n,f.lon,f.lat,f.h,f.hd);};
    r.querySelector('.del').onclick=()=>{a.splice(i,1);saveFavs(a);renderFavs();buildWarps();};
    list.appendChild(r);
  });
}

/* ================= スクリーンショット＆共有 ================= */
$('btnShot').onclick=async()=>{
  const f=$('flash');f.style.opacity=.85;setTimeout(()=>f.style.opacity=0,120);
  viewer.render();
  const src=viewer.scene.canvas;
  const c=document.createElement('canvas');c.width=src.width;c.height=src.height;
  const g=c.getContext('2d');g.drawImage(src,0,0);
  // 透かし
  const s=Math.round(c.width/34);
  g.font=`900 ${s}px 'Zen Kaku Gothic New',sans-serif`;
  g.fillStyle='rgba(255,255,255,.92)';g.shadowColor='rgba(0,0,0,.6)';g.shadowBlur=s/3;
  g.fillText('🚁 そらさんぽ日本',s,c.height-s*1.2);
  c.toBlob(async blob=>{
    const file=new File([blob],'sora-sanpo.jpg',{type:'image/jpeg'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'そらさんぽ日本',text:'ドローン視点で日本の空をおさんぽ🚁'});return;}catch(e){}
    }
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sora-sanpo.jpg';a.click();
    toast('📷 保存したで！');
  },'image/jpeg',0.9);
};
</script>
</body>
</html>
