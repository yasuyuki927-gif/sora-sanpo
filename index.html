<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#07111f" />
<meta property="og:title" content="そらさんぽ日本 v2 — ドローン視点で日本を飛ぼう" />
<meta property="og:description" content="実写3Dの日本の空を、スマホで遊びやすいドローン視点で自由に飛べるWebアプリ。" />
<title>そらさんぽ日本 v2 🚁</title>
<script>window.CESIUM_BASE_URL='https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118.0/';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118.0/Cesium.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118.0/Widgets/widgets.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#07111f; --panel:rgba(8,18,32,.58); --panel2:rgba(12,28,48,.76);
  --line:rgba(122,190,255,.28); --ink:#edf7ff; --mut:#91a9c4;
  --sky:#6fd3ff; --blue:#2b7bff; --amber:#ffba5c; --ok:#75efa2; --danger:#ff7d7d;
  --disp:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--disp);color:var(--ink);}
button,input{font-family:var(--disp);}
button{color:var(--ink);border:none;background:none;cursor:pointer;}
#cesiumContainer{position:absolute;inset:0;background:#06101d;}
.cesium-widget-credits{font-size:9px!important;opacity:.55;}
#lookZone{position:absolute;inset:0;z-index:10;touch-action:none;}

/* 起動画面 */
#start{position:absolute;inset:0;z-index:100;background:
  radial-gradient(80% 60% at 50% 18%,rgba(71,164,255,.26),transparent 60%),
  linear-gradient(180deg,#0e2744 0%,#07111f 68%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px;text-align:center;}
#start .logo{width:82px;height:82px;border-radius:28px;display:grid;place-items:center;font-size:42px;background:linear-gradient(145deg,rgba(111,211,255,.24),rgba(43,123,255,.18));border:1px solid rgba(139,210,255,.28);box-shadow:0 18px 60px rgba(43,123,255,.22);}
#start h1{font-size:28px;font-weight:900;letter-spacing:.04em;}
#start .badge{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:#08111f;background:linear-gradient(135deg,#9be8ff,#6fd3ff);padding:6px 10px;border-radius:999px;font-weight:700;}
#start .sub{font-size:13px;line-height:1.8;color:#b7c9dd;max-width:340px;}
#keyWrap{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;}
#key{width:100%;padding:14px 16px;border-radius:13px;border:1px solid var(--line);background:rgba(5,12,22,.86);color:var(--ink);font-size:14px;font-family:var(--mono);}
#go{width:100%;max-width:340px;padding:17px;border-radius:16px;font-size:17px;font-weight:900;letter-spacing:.08em;background:linear-gradient(135deg,#60d4ff,#2b7bff);box-shadow:0 16px 44px rgba(43,123,255,.35);}
#go:active{transform:scale(.985);}
#err{color:var(--danger);font-size:12px;min-height:16px;}
#start .foot{font-size:11px;color:#6f86a2;line-height:1.6;}

/* HUD */
#hud{position:absolute;inset:0;z-index:30;pointer-events:none;display:none;}
#topHud{position:absolute;top:calc(9px + var(--sat));left:10px;right:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
#brand{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:16px;background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--line);box-shadow:0 12px 34px rgba(0,0,0,.2);}
#brand .mini{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,#6fd3ff,#2b7bff);font-size:17px;}
#brand .name{font-size:13px;font-weight:900;letter-spacing:.04em;line-height:1;}
#brand .ver{font-family:var(--mono);font-size:9px;color:var(--sky);letter-spacing:.16em;margin-top:4px;}
#meters{display:flex;gap:6px;}
.meter{min-width:64px;padding:8px 10px;text-align:center;border-radius:14px;background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--line);}
.meter .k{font-size:9px;color:var(--mut);letter-spacing:.16em;}
.meter .v{font-family:var(--mono);font-size:17px;color:var(--sky);font-weight:700;font-variant-numeric:tabular-nums;line-height:1.25;}
.meter .v small{font-size:10px;color:var(--mut);margin-left:2px;}

#crosshair{position:absolute;left:50%;top:49%;width:68px;height:68px;transform:translate(-50%,-50%);opacity:.72;}
#crosshair:before,#crosshair:after{content:"";position:absolute;background:rgba(155,226,255,.86);box-shadow:0 0 12px rgba(111,211,255,.45);}
#crosshair:before{left:50%;top:0;width:1px;height:68px;}
#crosshair:after{left:0;top:50%;width:68px;height:1px;}
#crosshair .ring{position:absolute;inset:18px;border:1px solid rgba(155,226,255,.75);border-radius:50%;}
#lookHint{position:absolute;left:50%;top:calc(50% + 42px);transform:translateX(-50%);font-size:11px;color:rgba(237,247,255,.68);background:rgba(4,10,18,.32);border:1px solid rgba(122,190,255,.18);padding:7px 12px;border-radius:999px;backdrop-filter:blur(8px);}

#actions{position:absolute;top:calc(76px + var(--sat));right:12px;display:flex;flex-direction:column;gap:8px;pointer-events:auto;}
.act{width:48px;height:48px;border-radius:15px;background:var(--panel2);backdrop-filter:blur(14px);border:1px solid var(--line);font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(0,0,0,.18);}
.act:active{transform:scale(.96);background:rgba(84,200,255,.25);}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .25s;}

/* ワープバー */
#warp{position:absolute;left:0;right:0;bottom:calc(178px + var(--sab));pointer-events:auto;display:flex;gap:8px;overflow-x:auto;padding:6px 14px;scrollbar-width:none;}
#warp::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:24px;background:var(--panel2);backdrop-filter:blur(14px);border:1px solid var(--line);font-size:13px;font-weight:800;white-space:nowrap;box-shadow:0 10px 26px rgba(0,0,0,.18);}
.chip:active{transform:scale(.97);background:rgba(84,200,255,.32);}
.chip .rg{font-size:9px;font-weight:600;color:var(--mut);letter-spacing:.1em;}
.chip.fav{border-color:rgba(255,186,92,.52);}

/* 右スティック */
#stickR{position:absolute;right:18px;bottom:calc(26px + var(--sab));width:148px;height:148px;border-radius:50%;background:radial-gradient(circle,rgba(18,35,58,.34) 56%,rgba(18,35,58,.62));border:1px solid var(--line);pointer-events:auto;touch-action:none;box-shadow:inset 0 0 22px rgba(111,211,255,.08),0 16px 38px rgba(0,0,0,.22);}
#stickR .knob{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#a7ecff 0%,#6fd3ff 32%,#2b7bff 100%);box-shadow:0 8px 20px rgba(0,0,0,.42),0 0 24px rgba(111,211,255,.25);}
#stickR .lbl{position:absolute;left:-4px;right:-4px;bottom:-22px;text-align:center;font-size:10px;color:var(--mut);letter-spacing:.05em;}

/* 高度ボタン */
#altitude{position:absolute;left:17px;bottom:calc(30px + var(--sab));display:flex;flex-direction:column;gap:10px;pointer-events:auto;}
.altBtn{width:78px;height:62px;border-radius:18px;background:var(--panel2);backdrop-filter:blur(14px);border:1px solid var(--line);box-shadow:0 12px 30px rgba(0,0,0,.22);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-weight:900;touch-action:none;}
.altBtn .arr{font-family:var(--mono);font-size:22px;color:var(--sky);line-height:1;}
.altBtn .txt{font-size:10px;color:var(--mut);letter-spacing:.18em;}
.altBtn:active,.altBtn.on{background:rgba(84,200,255,.28);transform:scale(.97);}

/* スピード */
#speed{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(64px + var(--sab));pointer-events:auto;display:flex;background:var(--panel2);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 12px 28px rgba(0,0,0,.2);}
#speed button{padding:10px 15px;font-size:12px;font-weight:800;color:var(--mut);}
#speed button.on{background:linear-gradient(135deg,#54c8ff,#2b7bff);color:#fff;}

/* お気に入り */
#favPanel{position:absolute;inset:0;z-index:70;background:rgba(4,9,16,.74);backdrop-filter:blur(5px);display:none;align-items:flex-end;pointer-events:auto;}
#favSheet{width:100%;max-height:70%;background:#0e1b2e;border-radius:22px 22px 0 0;border-top:1px solid var(--line);padding:18px 18px calc(18px + var(--sab));display:flex;flex-direction:column;gap:12px;}
#favSheet h2{font-size:16px;font-weight:900;display:flex;justify-content:space-between;align-items:center;}
#favSheet h2 button{font-size:13px;color:var(--sky);font-weight:800;}
#favList{overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.favRow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
.favRow .nm{flex:1;font-size:14px;font-weight:800;text-align:left;}
.favRow .meta{font-family:var(--mono);font-size:10px;color:var(--mut);}
.favRow .del{font-size:16px;color:#ff8585;padding:4px 6px;}
#favEmpty{font-size:13px;color:var(--mut);text-align:center;padding:22px 0;line-height:1.8;}
#favAdd{padding:14px;border-radius:14px;font-size:15px;font-weight:900;background:linear-gradient(135deg,#ffc46b,#ff9d3d);color:#20140a;}

#toast{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(236px + var(--sab));z-index:80;background:rgba(12,24,42,.94);border:1px solid var(--line);border-radius:14px;padding:11px 18px;font-size:13px;font-weight:800;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 12px 30px rgba(0,0,0,.24);}
#warpFX{position:absolute;inset:0;z-index:90;display:grid;place-items:center;pointer-events:none;opacity:0;transition:opacity .3s;background:radial-gradient(circle at 50% 50%,rgba(111,211,255,.25),rgba(7,17,31,.72) 62%,rgba(7,17,31,.9));backdrop-filter:blur(4px);}
#warpFX.show{opacity:1;}
#warpFX .label{font-size:18px;font-weight:900;letter-spacing:.08em;text-shadow:0 0 20px rgba(111,211,255,.8);}
@media(max-width:370px){#meters{gap:4px}.meter{min-width:56px;padding:7px 8px}.meter .v{font-size:15px}#brand{padding:8px 10px}#stickR{width:138px;height:138px}.altBtn{width:70px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="lookZone"></div>

<div id="hud">
  <div id="topHud">
    <div id="brand"><div class="mini">🚁</div><div><div class="name">そらさんぽ日本</div><div class="ver">V2 FLIGHT</div></div></div>
    <div id="meters">
      <div class="meter"><div class="k">高度</div><div class="v"><span id="vAlt">0</span><small>m</small></div></div>
      <div class="meter"><div class="k">方位</div><div class="v" id="vDir">N</div></div>
      <div class="meter"><div class="k">速度</div><div class="v" id="vSpd">×1</div></div>
    </div>
  </div>

  <div id="crosshair"><div class="ring"></div></div>
  <div id="lookHint">画面をスワイプして向きを変更</div>

  <div id="actions">
    <button class="act" id="btnShot" aria-label="スクリーンショット">📷</button>
    <button class="act" id="btnFav" aria-label="お気に入り">⭐️</button>
  </div>

  <div id="warp"></div>

  <div id="altitude">
    <button class="altBtn" id="altUp"><span class="arr">▲</span><span class="txt">上昇</span></button>
    <button class="altBtn" id="altDown"><span class="arr">▼</span><span class="txt">下降</span></button>
  </div>

  <div id="speed">
    <button data-s="0.6">ゆっくり</button>
    <button data-s="1" class="on">ふつう</button>
    <button data-s="2.5">はやい</button>
  </div>

  <div id="stickR"><div class="knob"></div><div class="lbl">前後左右に移動</div></div>
  <div id="flash"></div>
</div>

<div id="favPanel">
  <div id="favSheet">
    <h2>⭐️ お気に入り地点 <button id="favClose">閉じる</button></h2>
    <button id="favAdd">＋ いまの場所を保存する</button>
    <div id="favList"></div>
  </div>
</div>

<div id="toast"></div>
<div id="warpFX"><div class="label">WARP</div></div>

<div id="start">
  <div class="logo">🚁</div>
  <div class="badge">VERSION 2</div>
  <h1>そらさんぽ日本</h1>
  <p class="sub">左スティックをやめて、上昇・下降ボタン式に変更。画面スワイプで向きを変えながら、日本の空をドローン視点で飛べます。</p>
  <div id="keyWrap">
    <input id="key" type="text" placeholder="Google Maps APIキー" autocomplete="off" />
    <div id="err"></div>
  </div>
  <button id="go">離陸する</button>
  <p class="foot">初回読み込みは数秒かかります。重い場合は「ゆっくり」で操作してください。</p>
</div>

<script>
/* 公開時はGoogle Cloud側でHTTPリファラー制限を必ず設定 */
const EMBEDDED_KEY = "AIzaSyDHWOWz7f0uk6NMtvLCRLnFpXFm3lgQOYg";

const WARPS = [
  ["🏯","大阪城","大阪",135.5259,34.6820,520,0.15],
  ["🍬","道頓堀","大阪",135.5013,34.6675,260,0.65],
  ["⛩","伏見稲荷","京都",135.7727,34.9671,360,4.7],
  ["🎋","清水寺","京都",135.7850,34.9949,340,4.5],
  ["🗼","東京タワー","東京",139.7454,35.6586,480,0.85],
  ["🌸","渋谷スクランブル","東京",139.7016,35.6595,300,1.2],
  ["🗻","富士山","静岡/山梨",138.7274,35.3606,4600,5.8],
  ["🦌","奈良公園","奈良",135.8430,34.6851,320,0.1],
  ["⛩","厳島神社","広島",132.3198,34.2958,340,2.4],
  ["🏰","名古屋城","愛知",136.8994,35.1856,380,3.1],
];

let viewer;
const st={lon:135.5259,lat:34.6820,h:700,heading:0.15,pitch:-0.42};
const move={x:0,y:0};
const alt={up:false,down:false};
let speedMul=1, warping=false, loopStarted=false, last=performance.now();

const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function toast(msg){const t=$('toast');t.textContent=msg;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,1900);}
function store(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function load(k){try{return localStorage.getItem(k);}catch(e){return null;}}

const savedKey=load('sk_key'); if(savedKey)$('key').value=savedKey;
if(EMBEDDED_KEY){$('keyWrap').style.display='none';}

$('go').onclick=async()=>{
  const k=EMBEDDED_KEY||$('key').value.trim();
  if(!k){$('err').textContent='APIキーを入力してな';return;}
  $('err').textContent='';$('go').textContent='読み込み中…';
  try{
    Cesium.GoogleMaps.defaultApiKey=k;
    viewer=new Cesium.Viewer('cesiumContainer',{
      baseLayer:false,baseLayerPicker:false,geocoder:false,homeButton:false,
      sceneModePicker:false,navigationHelpButton:false,animation:false,timeline:false,
      fullscreenButton:false,infoBox:false,selectionIndicator:false,
      terrainProvider:new Cesium.EllipsoidTerrainProvider(),
      contextOptions:{webgl:{preserveDrawingBuffer:true,alpha:false,antialias:false}},
      requestRenderMode:false,
    });
    viewer.resolutionScale = Math.min(1, window.devicePixelRatio > 2 ? 0.82 : 0.92);
    viewer.scene.globe.show=false;
    viewer.scene.fog.enabled=true;
    viewer.scene.skyAtmosphere.show=true;
    viewer.scene.screenSpaceCameraController.enableInputs=false;
    viewer.scene.primitives.add(await Cesium.createGooglePhotorealistic3DTileset());
    if(!EMBEDDED_KEY)store('sk_key',k);
    $('start').style.display='none';$('hud').style.display='block';
    buildWarps();renderFavs();enableControls();applyView();startLoop();
    introFlight();
  }catch(e){
    console.error(e);
    $('go').textContent='離陸する';
    $('err').textContent='読み込めへんかった。キーと「Map Tiles API」の有効化を確認してな。';
  }
};

function applyView(extraPitch=0){
  if(!viewer)return;
  viewer.camera.setView({
    destination:Cesium.Cartesian3.fromDegrees(st.lon,st.lat,st.h),
    orientation:{heading:st.heading,pitch:clamp(st.pitch+extraPitch,-1.25,-0.08),roll:move.x*0.15}
  });
}
function startLoop(){if(loopStarted)return;loopStarted=true;last=performance.now();requestAnimationFrame(loop);}
function loop(now){
  const dt=clamp((now-last)/16.67,0.35,2.2); last=now;
  if(!warping){
    const altDir=(alt.up?1:0)-(alt.down?1:0);
    st.h=clamp(st.h+altDir*18*speedMul*dt,55,9000);
    const fwd=-move.y, side=move.x;
    const base=0.0000048*speedMul*dt*(0.65+st.h/950);
    st.lat+=Math.cos(st.heading)*fwd*base+Math.cos(st.heading+Math.PI/2)*side*base;
    st.lon+=(Math.sin(st.heading)*fwd*base+Math.sin(st.heading+Math.PI/2)*side*base)/Math.cos(st.lat*Math.PI/180);
    st.lat=clamp(st.lat,24,46);
    st.lon=clamp(st.lon,122,154);
    const moving=clamp(Math.hypot(move.x,move.y)+Math.abs(altDir)*0.35,0,1);
    const bob=Math.sin(now/170)*0.0045*moving*speedMul;
    applyView(bob);
  }
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  $('vAlt').textContent=Math.round(st.h);
  $('vDir').textContent=dirs[Math.round(((st.heading*180/Math.PI)%360)/45)%8];
  requestAnimationFrame(loop);
}

function enableControls(){
  joystick($('stickR'),(x,y)=>{move.x=x;move.y=y;});
  hold($('altUp'),'up');
  hold($('altDown'),'down');
  lookControl();
}
function joystick(el,cb){
  const knob=el.querySelector('.knob');let active=false,cx=0,cy=0;const R=50;
  const set=(px,py)=>{let x=px-cx,y=py-cy;const d=Math.hypot(x,y);if(d>R){x=x/d*R;y=y/d*R;}knob.style.transform=`translate(${x}px,${y}px)`;cb(x/R,y/R);};
  const reset=()=>{active=false;knob.style.transform='';cb(0,0);};
  el.addEventListener('pointerdown',e=>{active=true;const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;el.setPointerCapture?.(e.pointerId);set(e.clientX,e.clientY);e.preventDefault();});
  el.addEventListener('pointermove',e=>{if(active){set(e.clientX,e.clientY);e.preventDefault();}});
  ['pointerup','pointercancel','lostpointercapture'].forEach(ev=>el.addEventListener(ev,reset));
}
function hold(el,key){
  const on=e=>{alt[key]=true;el.classList.add('on');el.setPointerCapture?.(e.pointerId);e.preventDefault();};
  const off=()=>{alt[key]=false;el.classList.remove('on');};
  el.addEventListener('pointerdown',on);
  ['pointerup','pointercancel','lostpointercapture','pointerleave'].forEach(ev=>el.addEventListener(ev,off));
}
function lookControl(){
  const z=$('lookZone');let active=false,lx=0,ly=0;
  z.addEventListener('pointerdown',e=>{active=true;lx=e.clientX;ly=e.clientY;z.setPointerCapture?.(e.pointerId);$('lookHint').style.opacity=.25;e.preventDefault();});
  z.addEventListener('pointermove',e=>{if(!active||warping)return;const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;st.heading=(st.heading+dx*0.0045+Math.PI*2)%(Math.PI*2);st.pitch=clamp(st.pitch+dy*0.0025,-1.15,-0.12);e.preventDefault();});
  ['pointerup','pointercancel','lostpointercapture'].forEach(ev=>z.addEventListener(ev,()=>{active=false;}));
}

document.querySelectorAll('#speed button').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('#speed button').forEach(x=>x.classList.remove('on'));b.classList.add('on');speedMul=parseFloat(b.dataset.s);$('vSpd').textContent='×'+b.dataset.s;toast('速度 '+b.textContent);};
});

function introFlight(){
  warping=true;showWarp('TAKE OFF');
  st.lon=135.513;st.lat=34.694;st.h=1250;st.heading=2.45;st.pitch=-0.48;applyView();
  setTimeout(()=>{
    viewer.camera.flyTo({
      destination:Cesium.Cartesian3.fromDegrees(135.5259,34.6820,520),
      orientation:{heading:0.15,pitch:-0.42,roll:0},duration:3.7,
      complete:()=>{Object.assign(st,{lon:135.5259,lat:34.6820,h:520,heading:0.15,pitch:-0.42});warping=false;toast('🚁 離陸完了。右で移動、左で高度');},
      cancel:()=>{warping=false;}
    });
  },500);
}
function showWarp(label){const f=$('warpFX');f.querySelector('.label').textContent=label;f.classList.add('show');setTimeout(()=>f.classList.remove('show'),850);}

function buildWarps(){
  const bar=$('warp');bar.innerHTML='';
  WARPS.forEach(w=>{
    const c=document.createElement('button');c.className='chip';
    c.innerHTML=`${w[0]} ${w[1]} <span class="rg">${w[2]}</span>`;
    c.onclick=()=>flyTo(w[1],w[3],w[4],w[5],w[6]);
    bar.appendChild(c);
  });
  favs().forEach(f=>{
    const c=document.createElement('button');c.className='chip fav';
    c.innerHTML=`⭐️ ${f.n}`;
    c.onclick=()=>flyTo(f.n,f.lon,f.lat,f.h,f.hd);
    bar.appendChild(c);
  });
}
function flyTo(name,lon,lat,h,hd){
  if(!viewer)return;warping=true;showWarp('WARP');toast(`${name}へワープ中`);
  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(lon,lat,h),
    orientation:{heading:hd,pitch:st.pitch,roll:0},duration:3.1,
    complete:()=>{Object.assign(st,{lon,lat,h,heading:hd});warping=false;toast(`${name}に到着`);},
    cancel:()=>{warping=false;}
  });
}

function favs(){try{return JSON.parse(load('sk_favs')||'[]');}catch(e){return[];}}
function saveFavs(a){store('sk_favs',JSON.stringify(a));}
$('btnFav').onclick=()=>{renderFavs();$('favPanel').style.display='flex';};
$('favClose').onclick=()=>{$('favPanel').style.display='none';};
$('favPanel').onclick=e=>{if(e.target.id==='favPanel')$('favPanel').style.display='none';};
$('favAdd').onclick=()=>{
  const a=favs();
  if(a.length>=5){toast('無料版はお気に入り5件まで');return;}
  const n=prompt('この場所の名前は？','マイスポット'+(a.length+1));
  if(!n)return;
  a.push({n:n.slice(0,12),lon:st.lon,lat:st.lat,h:Math.round(st.h),hd:st.heading});
  saveFavs(a);renderFavs();buildWarps();toast('⭐️ 保存しました');
};
function renderFavs(){
  const a=favs(),list=$('favList');list.innerHTML='';
  if(!a.length){list.innerHTML='<div id="favEmpty">まだ保存した場所がありません。<br>ええ景色を見つけたら「＋」で保存できます。</div>';return;}
  a.forEach((f,i)=>{
    const r=document.createElement('div');r.className='favRow';
    r.innerHTML=`<button class="nm">⭐️ ${f.n}</button><span class="meta">${Math.round(f.h)}m</span><button class="del">✕</button>`;
    r.querySelector('.nm').onclick=()=>{$('favPanel').style.display='none';flyTo(f.n,f.lon,f.lat,f.h,f.hd);};
    r.querySelector('.del').onclick=()=>{a.splice(i,1);saveFavs(a);renderFavs();buildWarps();};
    list.appendChild(r);
  });
}

$('btnShot').onclick=async()=>{
  const f=$('flash');f.style.opacity=.85;setTimeout(()=>f.style.opacity=0,120);
  viewer.render();
  const src=viewer.scene.canvas;
  const c=document.createElement('canvas');c.width=src.width;c.height=src.height;
  const g=c.getContext('2d');g.drawImage(src,0,0);
  const s=Math.round(c.width/34);
  g.font=`900 ${s}px 'Zen Kaku Gothic New',sans-serif`;
  g.fillStyle='rgba(255,255,255,.94)';g.shadowColor='rgba(0,0,0,.68)';g.shadowBlur=s/3;
  g.fillText('🚁 そらさんぽ日本 v2',s,c.height-s*1.2);
  c.toBlob(async blob=>{
    const file=new File([blob],'sora-sanpo-v2.jpg',{type:'image/jpeg'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'そらさんぽ日本 v2',text:'ドローン視点で日本の空をおさんぽ'});return;}catch(e){}
    }
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sora-sanpo-v2.jpg';a.click();
    toast('📷 保存しました');
  },'image/jpeg',0.9);
};
</script>
