<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}button,input{font:inherit}button{border:0;color:var(--txt);background:none}#cesiumContainer{position:absolute;inset:0}.cesium-widget-credits{font-size:9px!important;opacity:.5}#look{position:absolute;inset:0;z-index:5;touch-action:none}

#hud{display:none;position:absolute;inset:0;z-index:20;pointer-events:none}#top{position:absolute;top:calc(10px + var(--safeT));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px}.brand,.meter,.act,.chip,#speed,.alt,.stick{background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(14px);box-shadow:0 12px 28px rgba(0,0,0,.22)}.brand{padding:10px 12px;border-radius:16px}.brand b{display:block;font-size:13px;letter-spacing:.06em}.brand span{display:block;margin-top:3px;color:var(--sky);font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.16em}.meters{display:flex;gap:6px}.meter{min-width:62px;padding:8px 9px;border-radius:14px;text-align:center}.k{font-size:9px;color:var(--mut);letter-spacing:.16em}.v{font-family:ui-monospace,monospace;font-size:16px;font-weight:800;color:var(--sky)}.v small{font-size:9px;color:var(--mut)}

#actions{position:absolute;top:calc(78px + var(--safeT));right:12px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}.act{width:49px;height:49px;border-radius:15px;display:grid;place-items:center;font-weight:900}.hq{font-family:ui-monospace,monospace;font-size:13px;color:#06101d;background:linear-gradient(135deg,#a6ecff,#65d3ff)}#warp{position:absolute;left:0;right:0;bottom:calc(180px + var(--safeB));display:flex;gap:8px;overflow-x:auto;padding:6px 14px;pointer-events:auto;scrollbar-width:none}#warp::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;padding:10px 14px;border-radius:99px;font-size:13px;font-weight:800;white-space:nowrap}.chip span{font-size:9px;color:var(--mut);letter-spacing:.12em;margin-left:5px}
#altitude{position:absolute;left:17px;bottom:calc(30px + var(--safeB));display:flex;flex-direction:column;gap:10px;pointer-events:auto}.alt{width:76px;height:61px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;touch-action:none}.alt .a{font-family:ui-monospace,monospace;font-size:22px;color:var(--sky)}.alt .t{font-size:10px;color:var(--mut);letter-spacing:.16em}.alt.on{background:rgba(126,226,255,.22)}#speed{position:absolute;left:50%;bottom:calc(64px + var(--safeB));transform:translateX(-50%);border-radius:99px;overflow:hidden;display:flex;pointer-events:auto}#speed button{padding:10px 14px;color:var(--mut);font-size:12px;font-weight:800}#speed button.on{background:linear-gradient(135deg,#65d3ff,#2d75ff);color:white}.stick{position:absolute;right:18px;bottom:calc(26px + var(--safeB));width:148px;height:148px;border-radius:50%;pointer-events:auto;touch-action:none}.knob{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#b9f2ff,#65d3ff 35%,#2d75ff);box-shadow:0 8px 20px rgba(0,0,0,.45)}.lbl{position:absolute;left:-8px;right:-8px;bottom:-22px;text-align:center;color:var(--mut);font-size:10px}
#favPanel{display:none;position:absolute;inset:0;z-index:60;align-items:flex-end;background:rgba(0,0,0,.68);backdrop-filter:blur(5px);pointer-events:auto}#favSheet{width:100%;max-height:70%;padding:18px 18px calc(18px + var(--safeB));border-radius:22px 22px 0 0;background:#0b1728;border-top:1px solid var(--line)}#favSheet h2{display:flex;justify-content:space-between;font-size:16px;margin-bottom:12px}#favSheet h2 button{color:var(--sky);font-weight:800}#favAdd{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,#ffc66e,#ff983c);color:#20140a;font-weight:900;margin-bottom:12px}.favRow{display:flex;gap:8px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.05);margin-bottom:8px}.favRow .nm{flex:1;text-align:left;font-weight:800}.favRow .meta{font-family:ui-monospace,monospace;font-size:10px;color:var(--mut)}.favRow .del{color:#ff8b8b;font-size:16px}#empty{color:var(--mut);font-size:13px;text-align:center;padding:22px 0;line-height:1.7}
#toast{position:absolute;left:50%;bottom:calc(236px + var(--safeB));transform:translateX(-50%);z-index:70;opacity:0;transition:opacity .25s;padding:11px 16px;border-radius:14px;background:rgba(5,12,22,.92);border:1px solid var(--line);font-size:13px;font-weight:800;pointer-events:none}#fx{position:absolute;inset:0;z-index:70;display:grid;place-items:center;opacity:0;transition:opacity .3s;pointer-events:none;background:radial-gradient(circle,rgba(126,226,255,.25),rgba(5,11,20,.86) 66%);backdrop-filter:blur(4px)}#fx.show{opacity:1}#fx b{letter-spacing:.12em;text-shadow:0 0 22px rgba(126,226,255,.7)}#flash{position:absolute;inset:0;background:white;opacity:0;transition:opacity .2s;pointer-events:none}@media(max-width:370px){.meter{min-width:56px;padding:7px}.v{font-size:15px}.brand{padding:8px}.stick{width:138px;height:138px}.alt{width:70px}}
</style>

<body>
<div id="cesiumContainer"></div><div id="look"></div>
<div id="hud"><div id="top"><div class="brand"><b>そらさんぽ日本</b><span>V3 HIGH QUALITY</span></div><div class="meters"><div class="meter"><div class="k">高度</div><div class="v"><span id="vAlt">0</span><small>m</small></div></div><div class="meter"><div class="k">方位</div><div class="v" id="vDir">N</div></div><div class="meter"><div class="k">速度</div><div class="v" id="vSpd">×1</div></div></div></div><div id="cross"><div class="ring"></div></div><div id="hint">画面スワイプで向き変更</div><div id="actions"><button id="btnQ" class="act hq">HQ</button><button id="btnShot" class="act">📷</button><button id="btnFav" class="act">⭐</button></div><div id="warp"></div><div id="altitude"><button id="altUp" class="alt"><span class="a">▲</span><span class="t">上昇</span></button><button id="altDown" class="alt"><span class="a">▼</span><span class="t">下降</span></button></div><div id="speed"><button data-s="0.6">ゆっくり</button><button data-s="1" class="on">ふつう</button><button data-s="2.4">はやい</button></div><div id="stick" class="stick"><div class="knob"></div><div class="lbl">前後左右に移動</div></div><div id="flash"></div></div>
<div id="favPanel"><div id="favSheet"><h2>お気に入り地点 <button id="favClose">閉じる</button></h2><button id="favAdd">＋ いまの場所を保存する</button><div id="favList"></div></div></div>
<div id="toast"></div><div id="fx"><b>LOADING</b></div>
<div id="start"><div class="badge">VERSION 3</div><h1>そらさんぽ日本</h1><p class="sub">街を少しでも綺麗に見せるため、画質優先の3Dタイル読み込みに変更しました。重い場合は右上のHQで軽量モードに切替できます。</p><div id="keyWrap"><input id="key" type="text" placeholder="Google Maps APIキーを入力"><div id="err"></div></div><button id="go">離陸する</button><p class="foot">APIキーは端末内だけに保存されます。公開HTMLには直接入れていません。</p></div>
<script>
const EMBEDDED_KEY='';
const WARPS=[['大阪城','大阪',135.5259,34.6820,680,.15],['道頓堀','大阪',135.5013,34.6675,420,.65],['伏見稲荷','京都',135.7727,34.9671,520,4.7],['清水寺','京都',135.7850,34.9949,520,4.5],['東京タワー','東京',139.7454,35.6586,680,.85],['渋谷','東京',139.7016,35.6595,520,1.2],['富士山','静岡',138.7274,35.3606,4600,5.8],['奈良公園','奈良',135.8430,34.6851,500,.1],['厳島神社','広島',132.3198,34.2958,520,2.4],['名古屋城','愛知',136.8994,35.1856,540,3.1]];
let viewer,tileset,quality='high',speedMul=1,warping=false,started=false,last=performance.now();const st={lon:135.5259,lat:34.6820,h:820,heading:.15,pitch:-.46},mv={x:0,y:0},alt={up:false,down:false};
const $=id=>document.getElementById(id),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));function load(k){try{return localStorage.getItem(k)}catch(e){return null}}function store(k,v){try{localStorage.setItem(k,v)}catch(e){}}function toast(m){const t=$('toast');t.textContent=m;t.style.opacity=1;clearTimeout(t.h);t.h=setTimeout(()=>t.style.opacity=0,1900)}function fx(m){const f=$('fx');f.querySelector('b').textContent=m;f.classList.add('show');setTimeout(()=>f.classList.remove('show'),900)}
const saved=load('sk_key');if(saved)$('key').value=saved;if(EMBEDDED_KEY)$('keyWrap').style.display='none';
$('go').onclick=async()=>{const k=EMBEDDED_KEY||$('key').value.trim();if(!k){$('err').textContent='APIキーを入力してな';return}$('err').textContent='';$('go').textContent='高画質データ読み込み中…';try{Cesium.GoogleMaps.defaultApiKey=k;viewer=new Cesium.Viewer('cesiumContainer',{baseLayer:false,baseLayerPicker:false,geocoder:false,homeButton:false,sceneModePicker:false,navigationHelpButton:false,animation:false,timeline:false,fullscreenButton:false,infoBox:false,selectionIndicator:false,terrainProvider:new Cesium.EllipsoidTerrainProvider(),contextOptions:{webgl:{preserveDrawingBuffer:true,alpha:false,antialias:true}},requestRenderMode:false});viewer.scene.globe.show=false;viewer.scene.fog.enabled=false;viewer.scene.skyAtmosphere.show=true;viewer.scene.screenSpaceCameraController.enableInputs=false;tileset=await Cesium.createGooglePhotorealistic3DTileset();viewer.scene.primitives.add(tileset);tune('high',false);if(!EMBEDDED_KEY)store('sk_key',k);$('start').style.display='none';$('hud').style.display='block';buildWarps();renderFavs();controls();view();loopStart();intro()}catch(e){console.error(e);$('go').textContent='離陸する';$('err').textContent='読み込めへんかった。キーとMap Tiles APIを確認してな。'}};
function tune(q,notice=true){quality=q;const high=q==='high';if(viewer)viewer.resolutionScale=high?Math.min(1.35,devicePixelRatio>2?1.25:1.15):Math.min(1,devicePixelRatio>2?.85:.95);if(tileset){tileset.maximumScreenSpaceError=high?6:16;tileset.dynamicScreenSpaceError=!high;tileset.dynamicScreenSpaceErrorDensity=high?0:2e-4;tileset.dynamicScreenSpaceErrorFactor=high?0:24;tileset.foveatedScreenSpaceError=!high;tileset.progressiveResolutionHeightFraction=high?0:.3;tileset.preferLeaves=high;tileset.cullRequestsWhileMoving=!high;tileset.cacheBytes=high?805306368:536870912;tileset.maximumCacheOverflowBytes=high?805306368:536870912}$('btnQ').textContent=high?'HQ':'ECO';if(notice)toast(high?'高画質モード':'軽量モード')}
function view(extra=0){if(!viewer)return;viewer.camera.setView({destination:Cesium.Cartesian3.fromDegrees(st.lon,st.lat,st.h),orientation:{heading:st.heading,pitch:clamp(st.pitch+extra,-1.2,-.15),roll:mv.x*.1}})}function loopStart(){if(started)return;started=true;last=performance.now();requestAnimationFrame(loop)}function loop(now){const dt=clamp((now-last)/16.67,.35,2.2);last=now;if(!warping){const ad=(alt.up?1:0)-(alt.down?1:0);st.h=clamp(st.h+ad*18*speedMul*dt,220,9000);const f=-mv.y,s=mv.x,b=.0000046*speedMul*dt*(.65+st.h/950);st.lat+=Math.cos(st.heading)*f*b+Math.cos(st.heading+Math.PI/2)*s*b;st.lon+=(Math.sin(st.heading)*f*b+Math.sin(st.heading+Math.PI/2)*s*b)/Math.cos(st.lat*Math.PI/180);st.lat=clamp(st.lat,24,46);st.lon=clamp(st.lon,122,154);view(Math.sin(now/170)*.003*clamp(Math.hypot(mv.x,mv.y)+Math.abs(ad)*.35,0,1))}const dirs=['N','NE','E','SE','S','SW','W','NW'];$('vAlt').textContent=Math.round(st.h);$('vDir').textContent=dirs[Math.round(((st.heading*180/Math.PI)%360)/45)%8];requestAnimationFrame(loop)}
function controls(){joystick($('stick'),(x,y)=>{mv.x=x;mv.y=y});hold($('altUp'),'up');hold($('altDown'),'down');lookControl();$('btnQ').onclick=()=>tune(quality==='high'?'eco':'high');document.querySelectorAll('#speed button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#speed button').forEach(x=>x.classList.remove('on'));b.classList.add('on');speedMul=parseFloat(b.dataset.s);$('vSpd').textContent='×'+b.dataset.s;toast('速度 '+b.textContent)})}
function joystick(el,cb){const knob=el.querySelector('.knob');let on=false,cx=0,cy=0;const R=50,set=(px,py)=>{let x=px-cx,y=py-cy,d=Math.hypot(x,y);if(d>R){x=x/d*R;y=y/d*R}knob.style.transform=`translate(${x}px,${y}px)`;cb(x/R,y/R)},reset=()=>{on=false;knob.style.transform='';cb(0,0)};el.addEventListener('pointerdown',e=>{on=true;const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;el.setPointerCapture?.(e.pointerId);set(e.clientX,e.clientY);e.preventDefault()});el.addEventListener('pointermove',e=>{if(on){set(e.clientX,e.clientY);e.preventDefault()}});['pointerup','pointercancel','lostpointercapture'].forEach(ev=>el.addEventListener(ev,reset))}function hold(el,key){const on=e=>{alt[key]=true;el.classList.add('on');el.setPointerCapture?.(e.pointerId);e.preventDefault()},off=()=>{alt[key]=false;el.classList.remove('on')};el.addEventListener('pointerdown',on);['pointerup','pointercancel','lostpointercapture','pointerleave'].forEach(ev=>el.addEventListener(ev,off))}function lookControl(){const z=$('look');let on=false,lx=0,ly=0;z.addEventListener('pointerdown',e=>{on=true;lx=e.clientX;ly=e.clientY;z.setPointerCapture?.(e.pointerId);$('hint').style.opacity=.25;e.preventDefault()});z.addEventListener('pointermove',e=>{if(!on||warping)return;const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;st.heading=(st.heading+dx*.0045+Math.PI*2)%(Math.PI*2);st.pitch=clamp(st.pitch+dy*.0025,-1.1,-.16);e.preventDefault()});['pointerup','pointercancel','lostpointercapture'].forEach(ev=>z.addEventListener(ev,()=>on=false))}
function intro(){warping=true;fx('HIGH QUALITY');st.lon=135.513;st.lat=34.694;st.h=1450;st.heading=2.45;st.pitch=-.52;view();setTimeout(()=>viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(135.5259,34.6820,680),orientation:{heading:.15,pitch:-.46,roll:0},duration:4.2,complete:()=>{Object.assign(st,{lon:135.5259,lat:34.6820,h:680,heading:.15,pitch:-.46});warping=false;settle('大阪城')},cancel:()=>warping=false}),650)}function settle(name){toast(name+'を高精細読み込み中');setTimeout(()=>toast(name+' 高精細表示'),2200)}
function buildWarps(){const bar=$('warp');bar.innerHTML='';WARPS.forEach(w=>{const c=document.createElement('button');c.className='chip';c.innerHTML=`${w[0]} <span>${w[1]}</span>`;c.onclick=()=>flyTo(w[0],w[2],w[3],w[4],w[5]);bar.appendChild(c)});favs().forEach(f=>{const c=document.createElement('button');c.className='chip fav';c.textContent='⭐ '+f.n;c.onclick=()=>flyTo(f.n,f.lon,f.lat,Math.max(300,f.h),f.hd);bar.appendChild(c)})}function flyTo(name,lon,lat,h,hd){if(!viewer)return;warping=true;fx('LOADING');toast(name+'へ移動中');viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(lon,lat,Math.max(300,h)),orientation:{heading:hd,pitch:Math.min(st.pitch,-.35),roll:0},duration:3.4,complete:()=>{Object.assign(st,{lon,lat,h:Math.max(300,h),heading:hd});warping=false;settle(name)},cancel:()=>warping=false})}
function favs(){try{return JSON.parse(load('sk_favs')||'[]')}catch(e){return[]}}function saveFavs(a){store('sk_favs',JSON.stringify(a))}$('btnFav').onclick=()=>{renderFavs();$('favPanel').style.display='flex'};$('favClose').onclick=()=>{$('favPanel').style.display='none'};$('favPanel').onclick=e=>{if(e.target.id==='favPanel')$('favPanel').style.display='none'};$('favAdd').onclick=()=>{const a=favs();if(a.length>=5){toast('無料版はお気に入り5件まで');return}const n=prompt('この場所の名前は？','マイスポット'+(a.length+1));if(!n)return;a.push({n:n.slice(0,12),lon:st.lon,lat:st.lat,h:Math.round(st.h),hd:st.heading});saveFavs(a);renderFavs();buildWarps();toast('保存しました')};function renderFavs(){const a=favs(),list=$('favList');list.innerHTML='';if(!a.length){list.innerHTML='<div id="empty">まだ保存した場所がありません。</div>';return}a.forEach((f,i)=>{const r=document.createElement('div');r.className='favRow';r.innerHTML=`<button class="nm">${f.n}</button><span class="meta">${Math.round(f.h)}m</span><button class="del">×</button>`;r.querySelector('.nm').onclick=()=>{$('favPanel').style.display='none';flyTo(f.n,f.lon,f.lat,Math.max(300,f.h),f.hd)};r.querySelector('.del').onclick=()=>{a.splice(i,1);saveFavs(a);renderFavs();buildWarps()};list.appendChild(r)})}
$('btnShot').onclick=()=>{const f=$('flash');f.style.opacity=.85;setTimeout(()=>f.style.opacity=0,120);viewer.render();const src=viewer.scene.canvas,c=document.createElement('canvas');c.width=src.width;c.height=src.height;const g=c.getContext('2d');g.drawImage(src,0,0);const s=Math.round(c.width/34);g.font=`900 ${s}px -apple-system,sans-serif`;g.fillStyle='rgba(255,255,255,.94)';g.shadowColor='rgba(0,0,0,.68)';g.shadowBlur=s/3;g.fillText('そらさんぽ日本 v3',s,c.height-s*1.2);c.toBlob(async blob=>{const file=new File([blob],'sora-sanpo-v3.jpg',{type:'image/jpeg'});if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:'そらさんぽ日本 v3'});return}catch(e){}}const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sora-sanpo-v3.jpg';a.click();toast('保存しました')},'image/jpeg',.92)};
</script>
